description = "Render storyboard shot-by-shot, then stitch."

prompt = """
Project: {{args}}

Follow the video-director skill:
1. Validate storyboard.
2. Run `./bin/videogen storyboard estimate --project {{args}}`. Print the
   numbers to the user. If exit code 2 (over budget), STOP and require
   explicit user approval.
3. Only after approval: `./bin/videogen render --project {{args}} --yes` (resumable).
4. Recover failed shots per the skill's failure-recovery rules.
5. `./bin/videogen stitch --project {{args}}` once all shots succeed.
"""
